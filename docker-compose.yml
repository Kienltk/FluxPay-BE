version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: fluxpay-postgres
    restart: always
    environment:
      POSTGRES_DB: fluxpay
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 12345678
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fluxpay-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: